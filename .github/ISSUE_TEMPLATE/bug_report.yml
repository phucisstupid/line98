name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Start Classic mode
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device or emulator
      placeholder: Pixel 8 API 35
  - type: input
    id: version
    attributes:
      label: App version or commit
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant logs, screenshots, or screen recordings.
