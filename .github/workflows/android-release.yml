name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Debug APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        run: ./gradlew testDebugUnitTest assembleDebug assembleDebugAndroidTest --no-daemon

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: line98-${{ github.ref_name }}-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            app/build/outputs/apk/debug/app-debug.apk#Line98-${TAG_NAME}-debug.apk \
            --title "Line98 ${TAG_NAME}" \
            --notes "Debug APK build for Line98 ${TAG_NAME}."
